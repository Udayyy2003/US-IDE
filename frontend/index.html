<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>US-IDE — AI-Powered Cloud IDE</title>
    <meta name="description" content="US-IDE: Browser-based AI-powered IDE with Google login, multi-language support, and intelligent code assistance." />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Geist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #0a0a0f;
        color: #e8e8f0;
        font-family: 'Geist', 'Inter', system-ui, sans-serif;
        overflow: hidden;
        height: 100vh;
      }
      #root { height: 100vh; display: flex; flex-direction: column; }
      
      /* Scrollbar styling */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0a0a0f; }
      ::-webkit-scrollbar-thumb { background: #2a2a3d; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #7c6df5; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
